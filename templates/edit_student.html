<form action="/update_student/{{ student.Stud_id }}" method="POST">
    <input
    type="text"
    name="first_name"
    value="{{ student.first_name }}"
    class="form-control"
>

<input
    type="text"
    name="last_name"
    value="{{ student.last_name }}"
    class="form-control"
>
<input
    type="text"
    name="gender"
    value="{{ student.gender }}"
    class="form-control"
>
<input
    type="text"
    name="mobile_number"
    value="{{ student.mobile_number }}"
    class="form-control"
>

<input
    type="text"
    name="email"
    value="{{ student.email }}"
    class="form-control"
>
<input
    type="text"
    name="course_name"
    value="{{ student.course_name }}"
    class="form-control"
>


<button
    type="submit"
>
    Update Student
</button>

</form>
