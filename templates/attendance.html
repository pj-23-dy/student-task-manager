

{% extends 'layout.html' %}
{% block content %}

<h2>Mark Attendance</h2>

    <form action="/save_attendance" method="POST">

        <label>Student</label>

        <select name="student_id" class="form-control">

            {% for student in students %}

            <option value="{{ student.Stud_id }}">
                {{ student.first_name }} {{ student.last_name }}
            </option>

            {% endfor %}

        </select>

        <br><br>

        <label>Status</label>

        <select name="attendance_status">

            <option value="Present">
                Present
            </option>

            <option value="Absent">
                Absent
            </option>
             <option value="Leave">
                Leave
            </option>

        </select>

        <br><br>

        <button type="submit"
            class="btn btn-primary">
            Save Attendance
        </button>

    </form>

{% endblock %}
